<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proxy Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background:#f4f6f9;
}

.card-dashboard{
    border-left:5px solid #0d6efd;
}

.url-column{
    max-width:350px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

pre{
    background:#111;
    color:#00ff90;
    padding:15px;
    border-radius:8px;
    max-height:500px;
    overflow:auto;
}

.table td{
    vertical-align:middle;
}

@media(max-width:768px){

.table{
    font-size:12px;
}

.url-column{
    max-width:120px;
}

}


</style>


</head>


<body>


<div class="container-fluid p-3 p-md-5">


<div class="d-flex justify-content-between align-items-center mb-4">

<h1 class="h3">
🚀 Proxy Monitor
</h1>


<button class="btn btn-primary" id="btnRefresh">
Atualizar
</button>


</div>




<div class="row mb-4">


<div class="col-md-4 mb-3">

<div class="card shadow-sm card-dashboard">

<div class="card-body">

<h6>Total Capturas</h6>

<h2 id="total">0</h2>

</div>

</div>

</div>



<div class="col-md-4 mb-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>HTTPS</h6>

<h2 id="https">0</h2>

</div>

</div>

</div>



<div class="col-md-4 mb-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Erros</h6>

<h2 id="errors">0</h2>

</div>

</div>

</div>


</div>





<div class="card shadow">


<div class="card-header bg-dark text-white">

Capturas HTTP

</div>


<div class="card-body">


<div class="table-responsive">


<table class="table table-hover">

<thead>

<tr>

<th>ID</th>
<th>Método</th>
<th>Status</th>
<th>URL</th>
<th>IP</th>
<th>Tempo</th>
<th>Ações</th>

</tr>

</thead>


<tbody id="captureTable">

</tbody>


</table>


</div>


</div>


</div>


</div>








<div class="modal fade" id="detailModal">


<div class="modal-dialog modal-xl modal-dialog-scrollable">


<div class="modal-content">


<div class="modal-header">

<h5 class="modal-title">
Detalhes
</h5>


<button class="btn-close" data-bs-dismiss="modal"></button>


</div>


<div class="modal-body">

<pre id="details"></pre>

</div>


</div>


</div>


</div>






<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API = "/api/v1";


async function loadCaptures(){

    try {

        const response = await fetch(`${API}/capture`);

        if(!response.ok){
            throw new Error("Erro API");
        }


        const captures = await response.json();


        document.getElementById("total").innerText = captures.length;


        document.getElementById("https").innerText =
            captures.filter(x => x.tls).length;


        document.getElementById("errors").innerText =
            captures.filter(x => x.statusCode >= 400).length;



        const table = document.getElementById("captureTable");

        table.innerHTML = "";



        captures.forEach(capture => {


            const statusClass =
                capture.statusCode >= 400
                ? "danger"
                : "success";


            const methodClass =
                capture.method === "GET"
                ? "primary"
                : "warning";



            const row = document.createElement("tr");


            row.innerHTML = `

                <td>${capture.id ?? ""}</td>


                <td>
                    <span class="badge bg-${methodClass}">
                        ${capture.method ?? ""}
                    </span>
                </td>


                <td>
                    <span class="badge bg-${statusClass}">
                        ${capture.statusCode ?? ""}
                    </span>
                </td>


                <td class="url-column">
                    ${escapeHtml(capture.url ?? "")}
                </td>


                <td>
                    ${capture.clientIp ?? ""}
                </td>


                <td>
                    ${capture.durationMs ?? 0} ms
                </td>


                <td>


                    <button 
                    class="btn btn-sm btn-info me-1"
                    onclick="showDetails(${capture.id})">
                        Detalhes
                    </button>



                    <button
                    class="btn btn-sm btn-danger"
                    onclick="deleteCapture(${capture.id})">
                        Excluir
                    </button>


                </td>

            `;


            table.appendChild(row);


        });



    } catch(error){

        console.error(error);

        alert("Erro carregando capturas");

    }

}





async function deleteCapture(id){


    if(!confirm("Deseja remover esta captura?")){
        return;
    }



    try{


        const response = await fetch(
            `${API}/capture/${encodeURIComponent(id)}`,
            {
                method:"DELETE"
            }
        );



        const result = await response.json();



        if(!response.ok){

            throw new Error(
                result.error || "Falha ao remover"
            );

        }



        alert("Captura removida com sucesso");


        loadCaptures();



    }catch(error){


        console.error(error);


        alert(
            "Erro ao remover captura: " + error.message
        );


    }


}







async function showDetails(id){


    try{


        const response = await fetch(
            `${API}/capture/${id}`
        );


        if(!response.ok){

            throw new Error(
                "Erro buscando detalhes"
            );

        }


        const data = await response.json();



        document.getElementById("details").textContent =
            JSON.stringify(
                data,
                null,
                2
            );



        const modal =
            new bootstrap.Modal(
                document.getElementById("detailModal")
            );


        modal.show();



    }catch(error){


        console.error(error);


        alert(
            "Erro ao abrir detalhes"
        );


    }


}







function escapeHtml(text){


    return String(text)

    .replace(/&/g,"&amp;")

    .replace(/</g,"&lt;")

    .replace(/>/g,"&gt;")

    .replace(/"/g,"&quot;")

    .replace(/'/g,"&#039;");


}






loadCaptures();



setInterval(
    loadCaptures,
    5000
);



</script>



</body>

</html>
